name = "bandico-cms-api"
compatibility_date = "2024-01-01"
pages_build_output_dir = "dist"

[[d1_databases]]
binding = "DB"
database_name = "bandico-cms"
database_id = "25580b52-61bb-40c1-877d-b7c87130508b"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "bandico-images"

[vars]
JWT_SECRET = "bandico-admin-secret-change-in-production"
ADMIN_USERNAME = "admin"
# Default password hash for "bandico2026" — generate new hash in production
ADMIN_PASSWORD_HASH = "$2a$10$placeholder"
